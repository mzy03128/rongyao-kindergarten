<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff8fb" />
    <title>绒耀幼稚园 · 离线中</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fff8fb 0%, #f9efe3 100%);
        color: #5d4f55;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(360px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.86);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 60px rgba(193, 151, 167, 0.22);
      }

      h1 {
        margin: 0 0 10px;
        color: #d46f8d;
        font-size: 26px;
      }

      p {
        margin: 0;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>绒耀幼稚园暂时离线</h1>
      <p>请检查网络后重新打开。已经安装到桌面的版本会自动加载最新网页。</p>
    </main>
  </body>
</html>
